<div th:fragment="teams">
    <link rel="stylesheet" th:href="@{/assets/css/tournament-fragment-teams.css}">

    <section class="teams-section">
        <div class="teams-toolbar">
            <div>
                <h2 class="teams-title">Danh sách đội tham gia</h2>
                <div class="teams-count" th:text="${(teamCards != null ? #lists.size(teamCards) : 0) + ' đội đã xác nhận tham gia'}">0 đội đã xác nhận tham gia</div>
            </div>
            <input id="teamsSearchInput" class="search-box-teams" type="text" placeholder="Tìm theo tên đội...">
        </div>

        <div class="team-grid">
            <article class="team-card" th:each="team : ${teamCards}" th:attr="data-team-name=${team.teamName}">
                <div class="team-card__cover" th:text="${team.coverLetter}">T</div>
                <div class="team-card__body">
                    <div class="team-card__head">
                        <div class="team-card__logo">
                            <img th:if="${team.logoUrl != null and !#strings.isEmpty(team.logoUrl)}" th:src="${team.logoUrl}" alt="logo" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">
                        </div>
                        <h3 class="team-card__name" th:text="${team.teamName}">Tên đội</h3>
                    </div>
                    <div class="team-card__meta">
                        <div th:text="${'Đội trưởng: ' + (team.captainName != null and !#strings.isEmpty(team.captainName) ? team.captainName : 'Chưa cập nhật')}">Đội trưởng</div>
                        <div th:text="${'Mã đội: #' + team.teamCode}">Mã đội</div>
                    </div>
                    <div class="team-card__actions">
                        <span class="member-chip" th:text="${team.memberCount + ' thành viên'}">0 thành viên</span>
                        <button type="button" class="detail-btn" th:attr="data-team-name=${team.teamName},data-lineup-url=@{/user/tournament/team-lineup(tournamentId=${tournament != null ? tournament.id : null},teamId=${team.teamId})}">Xem đội hình</button>
                    </div>
                </div>
            </article>
            <div th:if="${teamCards == null or #lists.isEmpty(teamCards)}" style="padding:16px; border:1px dashed #d9d9d9; border-radius:12px;">Chưa có đội được xác nhận ở giải đấu này</div>
        </div>
    </section>

    <!-- Team Lineup Modal (Should be outside content but for simplicity within fragment) -->
    <div class="modal team-modal" id="teamLineupModal" aria-hidden="true">
        <div class="modal__backdrop team-modal__backdrop" onclick="closeTeamModal()"></div>
        <section class="modal__dialog team-modal__dialog" role="dialog" aria-modal="true">
            <header class="modal__top team-modal__top">
                <h2 class="modal__title team-modal__title" id="teamLineupModalTitle">CHI TIẾT ĐỘI HÌNH</h2>
                <button type="button" class="modal__close team-modal__close" onclick="closeTeamModal()">×</button>
            </header>
            <div class="modal__body team-modal__body">
                <div class="lineup-panel">
                    <h3 class="lineup-team" id="lineupTeamName">CNTT United</h3>
                    <div class="pitch team-modal__pitch" id="teamLineupPitch"></div>
                    <div class="bench-title team-modal__bench-title">Đội hình dự bị</div>
                    <div class="bench team-modal__bench" id="teamLineupBench"></div>
                </div>
            </div>
        </section>
    </div>

    <script>
        (() => {
            const teamsSearchInput = document.getElementById('teamsSearchInput');
            const teamCards = Array.from(document.querySelectorAll('.team-grid .team-card'));
            const teamLineupModal = document.getElementById('teamLineupModal');
            const lineupTeamName = document.getElementById('lineupTeamName');
            const teamLineupPitch = document.getElementById('teamLineupPitch');
            const teamLineupBench = document.getElementById('teamLineupBench');

            if (teamsSearchInput) {
                teamsSearchInput.addEventListener('input', () => {
                    const query = teamsSearchInput.value.trim().toLowerCase();
                    teamCards.forEach(card => {
                        const name = (card.dataset.teamName || '').toLowerCase();
                        card.style.display = !query || name.includes(query) ? '' : 'none';
                    });
                });
            }

            const avatarOf = player => player?.avatarUrl || ('https://i.pravatar.cc/100?u=' + (player?.id || Math.random()));

            const renderPitch = lineup => {
                const slots = Array.isArray(lineup?.pitchSlots) ? lineup.pitchSlots : [];
                const starterMap = new Map();
                if (Array.isArray(lineup?.starters)) {
                    lineup.starters.forEach(item => {
                        starterMap.set(item.slotIndex, item);
                    });
                }
                teamLineupPitch.innerHTML = slots.map(slot => {
                    const starter = starterMap.get(slot.index);
                    if (!starter || !starter.player) {
                        return '<div class="team-modal__slot team-modal__slot-marker" style="top:' + slot.top + '%;left:' + slot.left + '%;">' + slot.label + '</div>';
                    }
                    const p = starter.player;
                    const numberText = p.jerseyNumber == null ? '' : ('#' + p.jerseyNumber);
                    const posText = p.position || starter.position || slot.label || '';
                    return '<div class="team-modal__token" style="top:' + slot.top + '%;left:' + slot.left + '%;">'
                        + '<img src="' + avatarOf(p) + '" alt="' + (p.fullName || 'player') + '">'
                        + '<div class="team-modal__token-meta">' + posText + '<br>' + numberText + '<br>' + (p.fullName || '') + '</div>'
                        + '</div>';
                }).join('');
            };

            const renderBench = lineup => {
                const players = Array.isArray(lineup?.bench) ? lineup.bench : [];
                if (!players.length) {
                    teamLineupBench.innerHTML = '<div class="team-modal__empty">Chưa có cầu thủ dự bị</div>';
                    return;
                }
                teamLineupBench.innerHTML = players.map(player => {
                    const numberText = player.jerseyNumber == null ? '' : ('#' + player.jerseyNumber + ' ');
                    return '<div class="team-modal__bench-item"><img src="' + avatarOf(player) + '" alt="' + (player.fullName || 'player') + '"><span>' + numberText + (player.fullName || '') + '</span></div>';
                }).join('');
            };

            const openTeamModal = teamName => {
                lineupTeamName.textContent = teamName;
                teamLineupModal.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            };

            const closeTeamModal = () => {
                teamLineupModal.style.display = 'none';
                document.body.style.overflow = '';
            };

            window.openTeamModal = openTeamModal;
            window.closeTeamModal = closeTeamModal;

            document.querySelectorAll('.detail-btn[data-lineup-url]').forEach(button => {
                button.addEventListener('click', async () => {
                    const lineupUrl = button.dataset.lineupUrl;
                    if (!lineupUrl) {
                        return;
                    }
                    const originalText = button.textContent;
                    button.disabled = true;
                    button.textContent = 'Đang tải...';
                    try {
                        const response = await fetch(lineupUrl, { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
                        if (!response.ok) {
                            throw new Error('Không thể tải đội hình');
                        }
                        const data = await response.json();
                        if (!data.found) {
                            alert(data.message || 'Đội chưa có đội hình');
                            return;
                        }
                        openTeamModal(data.teamName || button.dataset.teamName || 'Đội bóng');
                        renderPitch(data);
                        renderBench(data);
                    } catch (error) {
                        alert('Không thể tải đội hình. Vui lòng thử lại.');
                    } finally {
                        button.disabled = false;
                        button.textContent = originalText;
                    }
                });
            });
        })();
    </script>
</div>

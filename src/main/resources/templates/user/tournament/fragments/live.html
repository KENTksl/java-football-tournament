<div th:fragment="live">
    <style>
        .live-archive-shell { display: grid; gap: 14px; }
        .live-archive-headline { margin: 0; font-size: 18px; font-weight: 800; color: #0f172a; }
        .live-archive-wrap { display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); align-items: start; }
        .live-archive-empty { border: 1px solid #d9d9d9; border-radius: 12px; background: #fff; padding: 16px; color: #6b7280; font-weight: 600; }
        .live-archive-card { border: 1px solid #e7edf5; border-radius: 14px; background: #fff; overflow: hidden; box-shadow: 0 2px 10px rgba(15,23,42,0.06); }
        .live-archive-player { position: relative; margin: 10px 10px 8px; border-radius: 12px; overflow: hidden; background: #000; aspect-ratio: 16 / 9; display: grid; place-items: center; }
        .live-archive-play-btn { width: 64px; height: 64px; border: 0; border-radius: 999px; background: #ef4444; color: #fff; font-size: 26px; font-weight: 700; cursor: pointer; display: grid; place-items: center; z-index: 2; box-shadow: 0 8px 24px rgba(239,68,68,0.45); }
        .live-archive-frame { width: 100%; height: 100%; border: 0; background: #000; }
        .live-archive-player.is-playing .live-archive-play-btn { display: none; }
        .live-archive-info { display: flex; align-items: flex-start; gap: 10px; padding: 6px 12px 14px; }
        .live-archive-content { min-width: 0; display: grid; gap: 4px; }
        .live-archive-title { margin: 0; font-size: 15px; font-weight: 700; line-height: 1.4; color: #0f172a; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .live-archive-meta { color: #64748b; font-size: 12px; font-weight: 500; line-height: 1.5; display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
        .live-archive-link { text-decoration: none; color: #334155; font-size: 12px; font-weight: 700; width: fit-content; }
        .live-archive-link:hover { color: #1d4ed8; }
        @media (max-width: 700px) {
            .live-archive-wrap { grid-template-columns: 1fr; }
        }
    </style>

    <div class="live-archive-shell" th:if="${liveArchive != null and liveArchive.hasVideos}">
        <h3 class="live-archive-headline">Video Live Đã Lưu</h3>
        <div class="live-archive-wrap">
            <article class="live-archive-card" th:each="video : ${liveArchive.videos}">
                <div class="live-archive-player js-live-player" th:attr="data-video-url=${video.archiveUrl}">
                    <button type="button" class="live-archive-play-btn" data-live-play>▶</button>
                    <iframe class="live-archive-frame"
                            allowfullscreen
                            allowtransparency
                            allow="autoplay; encrypted-media; picture-in-picture"
                            referrerpolicy="strict-origin-when-cross-origin"
                            hidden></iframe>
                </div>
                <div class="live-archive-info">
                    <div class="live-archive-content">
                        <h3 class="live-archive-title" th:text="${video.title}">Đội 1 vs Đội 2</h3>
                        <div class="live-archive-meta">
                            <span th:text="${video.roundName != null ? video.roundName : 'Live bóng đá'}">Live bóng đá</span>
                            <span>•</span>
                            <span th:text="${video.scheduledAt != null ? #temporals.format(video.scheduledAt, 'dd/MM/yyyy HH:mm') : 'Chưa cập nhật giờ'}">--/--/----</span>
                        </div>
                        <a class="live-archive-link" th:href="${video.archiveUrl}" target="_blank" rel="noopener noreferrer">Xem bản gốc</a>
                    </div>
                </div>
            </article>
        </div>
    </div>

    <div class="live-archive-empty" th:if="${liveArchive == null or !liveArchive.hasVideos}" th:text="${liveArchive != null ? liveArchive.message : 'Chưa có video live nào được lưu'}">Chưa có video live nào được lưu</div>

    <script th:inline="javascript">
        (() => {
            const players = document.querySelectorAll('.js-live-player');
            if (!players.length) return;
            players.forEach((player) => {
                const btn = player.querySelector('[data-live-play]');
                const frame = player.querySelector('.live-archive-frame');
                if (!btn || !frame) return;
                btn.addEventListener('click', () => {
                    if (player.classList.contains('is-playing')) return;
                    let url = player.dataset.videoUrl || '';
                    if (!url) return;
                    if (!url.includes('autoplay=1')) {
                        url += (url.includes('?') ? '&' : '?') + 'autoplay=1';
                    }
                    frame.src = url;
                    frame.hidden = false;
                    player.classList.add('is-playing');
                });
            });
        })();
    </script>
</div>

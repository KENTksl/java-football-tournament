<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="best-players">
    <style>
        .best-players-container {
            padding: 20px 0;
        }
        .best-players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .best-player-card {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }
        .best-player-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            overflow: hidden;
            background: #f3f6f9;
            flex-shrink: 0;
            border: 2px solid #009cff;
        }
        .best-player-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .best-player-info {
            flex: 1;
        }
        .best-player-name {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 2px;
            color: #111827;
        }
        .best-player-team {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 4px;
        }
        .best-player-meta {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .best-player-rating {
            background: #009cff;
            color: #fff;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
        }
        .best-player-pos {
            font-size: 11px;
            background: #f3f4f6;
            padding: 1px 6px;
            border-radius: 4px;
            color: #374151;
            font-weight: 600;
        }
        .best-players-empty {
            text-align: center;
            padding: 40px;
            color: #6b7280;
            background: #f9fafb;
            border-radius: 12px;
        }
    </style>

    <div class="best-players-container">
        <div th:if="${#lists.isEmpty(bestPlayers)}" class="best-players-empty">
            Chưa có dữ liệu xếp hạng cầu thủ cho giải đấu này.
        </div>

        <div th:unless="${#lists.isEmpty(bestPlayers)}" class="matches-best-players-container">
            <div th:each="match : ${bestPlayers}" class="match-best-players-section" style="margin-bottom: 40px;">
                <div class="match-header" style="background: #f9fafb; padding: 16px 24px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee;">
                    <div style="font-weight: 700; color: #009cff; font-size: 16px;" th:text="${match.roundName}">Vòng đấu</div>
                    <div style="font-size: 18px; font-weight: 800;">
                        <span th:text="${match.homeTeamName}">Đội 1</span>
                        <span style="margin: 0 12px; color: #009cff;" th:text="${match.homeScore + ' - ' + match.awayScore}">0 - 0</span>
                        <span th:text="${match.awayTeamName}">Đội 2</span>
                    </div>
                </div>

                <div class="best-players-grid">
                    <div th:each="player, iter : ${match.players}" class="best-player-card">
                        <div class="best-player-avatar">
                            <img th:src="${player.avatarUrl ?: '/assets/images/default-avatar.png'}" alt="Avatar">
                        </div>
                        <div class="best-player-info">
                            <div class="best-player-name" th:text="${player.fullName}">Cầu thủ</div>
                            <div class="best-player-team">
                                <span th:text="${player.teamName}">Đội bóng</span>
                                <span th:if="${player.jerseyNumber != null}" style="font-size: 12px; color: #9ca3af; margin-left: 4px;" th:text="'(Số áo: ' + ${player.jerseyNumber} + ')'">(Số áo: 10)</span>
                            </div>
                            <div class="best-player-meta">
                                <span class="best-player-rating" th:text="${#numbers.formatDecimal(player.totalRating, 1, 1)}">0.0</span>
                                <span class="best-player-pos" th:text="${player.position}">FW</span>
                                <div style="font-size: 12px; color: #10b981; font-weight: 600; display: flex; align-items: center; gap: 4px; margin-left: auto;">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 8v4l3 3"></path></svg>
                                    <span th:text="${player.goals} + ' Bàn'">0 Bàn</span>
                                </div>
                            </div>
                        </div>
                        <div style="font-weight: 800; color: #009cff; font-size: 20px; opacity: 0.2;" th:text="${iter.index + 1}">1</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

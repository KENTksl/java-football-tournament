<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý đội tuyển</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/admin.css">
    <style>
        :root {
            --bg: #ffffff;
            --surface: #f3f6f9;
            --border: #d9d9d9;
            --text: #111827;
            --muted: #6b7280;
            --muted-2: #b3b3b3;
            --brand: #009cff;
            --radius-xl: 25px;
            --radius-lg: 20px;
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
            color: var(--text);
            background: var(--bg);
        }

        .app {
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar Styles from general-overview */
        .sidebar {
            width: 300px;
            padding: 24px 18px;
            border-right: 1px solid rgba(17, 24, 39, 0.06);
            background: var(--bg);
            display: flex;
            flex-direction: column;
        }

        .sidebar__brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 14px;
            border-radius: var(--radius-lg);
            background: var(--surface);
            margin: 0 6px 18px;
        }

        .sidebar__brandIcon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(0, 156, 255, 0.18), rgba(0, 156, 255, 0.06));
            display: grid;
            place-items: center;
        }

        .sidebar__brandIcon svg { width: 26px; height: 26px; }

        .sidebar__brandTitle {
            font-weight: 700;
            font-size: 18px;
            line-height: 1.2;
        }

        .nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 0 6px;
        }

        .nav__item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 12px;
            border-radius: var(--radius-lg);
            text-decoration: none;
            color: var(--text);
        }

        .nav__item:hover {
            background: rgba(243, 246, 249, 0.8);
        }

        .nav__item--active {
            background: var(--surface);
        }

        .nav__icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            overflow: hidden;
            flex: 0 0 auto;
            background: rgba(17, 24, 39, 0.06);
            display: grid;
            place-items: center;
        }

        .nav__icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .nav__label {
            font-weight: 500;
            font-size: 16px;
        }

        .nav__item--large {
            padding: 10px 12px;
        }

        .nav__icon--large {
            width: 71px;
            height: 71px;
            border-radius: 20px;
            background: var(--surface);
        }

        .nav__label--large {
            font-weight: 600;
            font-size: 18px;
        }

        .nav__chevron {
            margin-left: auto;
            width: 18px;
            height: 18px;
            opacity: 0.55;
        }

        .sidebar__footer {
            margin-top: auto;
            padding: 0 6px;
        }

        /* Topbar Styles from general-overview */
        .content {
            flex: 1 1 auto;
            padding: 28px 32px;
        }

        .topbar {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 26px;
        }

        .topbar__menuBtn {
            width: 44px;
            height: 44px;
            border: 0;
            background: transparent;
            display: grid;
            place-items: center;
            padding: 0;
            cursor: pointer;
        }

        .topbar__menuBtn img {
            width: 30px;
            height: 30px;
            display: block;
        }

        .search {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            width: 320px;
            height: 62px;
            border-radius: 9999px;
            background: var(--surface);
            border: 1px solid var(--border);
        }

        .search svg { width: 18px; height: 18px; color: var(--muted-2); }

        .search input {
            border: 0;
            outline: none;
            background: transparent;
            width: 100%;
            font-size: 16px;
            color: var(--text);
        }

        .topbar__right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .iconBtn {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--surface);
            border: 0;
            display: grid;
            place-items: center;
            cursor: pointer;
        }

        .iconBtn img { width: 20px; height: 20px; display: block; }

        .profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 9999px;
            background: transparent;
        }

        .profile__avatar {
            width: 44px;
            height: 44px;
            border-radius: 9999px;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(0, 156, 255, 0.22), rgba(17, 24, 39, 0.08));
        }

        .profile__avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .profile__name {
            font-weight: 600;
            font-size: 16px;
            white-space: nowrap;
        }

        .profile__dropdown {
            width: 18px;
            height: 18px;
            display: block;
            opacity: 0.65;
        }

        /* Table Specific Styles from image */
        .section-title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 24px;
            color: #111827;
        }

        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
            width: fit-content;
            border: 1px solid #000;
        }

        .tab {
            padding: 10px 24px;
            background: #fff;
            border: none;
            border-right: 1px solid #000;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            color: #111827;
        }

        .tab:last-child {
            border-right: none;
        }

        .tab--active {
            background: #fff;
            color: #111827;
            text-decoration: underline;
        }

        .table-container {
            border: 2px solid #000;
            border-radius: 0;
            overflow: hidden;
            background: #fff;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th, .data-table td {
            border: 1px solid #000;
            padding: 16px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            color: #000;
        }

        .data-table th {
            background: #fff;
            font-weight: 700;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 32px;
            width: 120px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 14px;
            text-align: center;
        }

        .badge--approved {
            background: #2e7d32;
            color: #fff;
        }

        .badge--pending {
            background: #fbc02d;
            color: #000;
        }
        .badge--rejected {
            background: #c62828;
            color: #fff;
        }

        .btn-detail {
            background: #fff;
            border: 1.5px solid #000;
            border-radius: 20px;
            padding: 6px 20px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: inline-block;
        }

        .tournament-filter {
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tournament-filter select {
            min-width: 320px;
            height: 40px;
            border: 1px solid #000;
            border-radius: 8px;
            padding: 0 10px;
            font-weight: 600;
            background: #fff;
        }

        .action-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-status {
            border: 1px solid #000;
            background: #fff;
            border-radius: 16px;
            padding: 5px 10px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-status--approve {
            border-color: #2e7d32;
            color: #2e7d32;
        }

        .btn-status--reject {
            border-color: #c62828;
            color: #c62828;
        }

        .flash-message {
            margin-bottom: 12px;
            padding: 10px 12px;
            border: 1px solid #9ec5fe;
            border-radius: 8px;
            background: #eef4ff;
            font-weight: 600;
            color: #12418f;
        }

        /* Pagination Styles */
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 40px;
            gap: 16px;
        }

        .page-numbers {
            display: flex;
            gap: 10px;
        }

        .page-btn {
            width: 36px;
            height: 36px;
            border: 1px solid #000;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
        }

        .page-btn--active {
            background: #fff;
        }

        .arrow-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
        }

        .triangle-left {
            width: 0;
            height: 0;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-right: 20px solid #009cff;
        }

        .triangle-right {
            width: 0;
            height: 0;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-left: 20px solid #009cff;
        }

        @media (max-width: 900px) {
            .sidebar { display: none; }
            .content { padding: 18px; }
            .search { width: 100%; }
        }
    </style>
</head>
<body>
<div class="app" th:with="activePage='manage', activeSubPage='team'">
    <aside th:replace="~{admin/fragments_admin/sidebar :: sidebar}"></aside>

    <main class="content">
        <header th:replace="~{admin/fragments_admin/header :: header}"></header>

        <!-- Main Content: Team Management Table -->
        <h1 class="section-title">Danh Sách Hồ Sơ Đội Tuyển</h1>

        <div class="tournament-filter">
            <span>Giải đấu:</span>
            <form method="get" th:action="@{/admin/team-management}">
                <input type="hidden" name="status" th:value="${selectedStatus}">
                <select name="tournamentId" onchange="this.form.submit()">
                    <option th:each="t : ${tournaments}"
                            th:value="${t.id}"
                            th:text="${t.name}"
                            th:selected="${selectedTournamentId != null and selectedTournamentId == t.id}">
                        Tên giải
                    </option>
                </select>
            </form>
        </div>

        <div class="flash-message" th:if="${teamManageMessage != null}" th:text="${teamManageMessage}">Thông báo</div>

        <div class="tabs">
            <a class="tab" th:classappend="${selectedStatus == 'ALL' ? ' tab--active' : ''}" th:href="@{/admin/team-management(tournamentId=${selectedTournamentId},status='ALL')}">Tất cả</a>
            <a class="tab" th:classappend="${selectedStatus == 'PENDING' ? ' tab--active' : ''}" th:href="@{/admin/team-management(tournamentId=${selectedTournamentId},status='PENDING')}">Chờ duyệt</a>
            <a class="tab" th:classappend="${selectedStatus == 'APPROVED' ? ' tab--active' : ''}" th:href="@{/admin/team-management(tournamentId=${selectedTournamentId},status='APPROVED')}">Đã duyệt</a>
            <a class="tab" th:classappend="${selectedStatus == 'REJECTED' ? ' tab--active' : ''}" th:href="@{/admin/team-management(tournamentId=${selectedTournamentId},status='REJECTED')}">Đã hủy</a>
        </div>

        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Ngày nộp</th>
                        <th>Tên đội</th>
                        <th>Người đại diện</th>
                        <th>SĐT</th>
                        <th>Số thành viên</th>
                        <th>Trạng thái</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${registrationRows == null or #lists.isEmpty(registrationRows)}">
                        <td colspan="7">Chưa có hồ sơ đăng ký trong giải đấu này</td>
                    </tr>
                    <tr th:each="row : ${registrationRows}">
                        <td th:text="${row.submittedDateText}">08/01/2026</td>
                        <td th:text="${row.teamName}">Tên đội</td>
                        <td th:text="${row.representativeName}">Đại diện</td>
                        <td th:text="${row.phone}">0900000000</td>
                        <td th:text="${row.memberCount}">10</td>
                        <td><span class="badge" th:classappend="${' ' + row.statusClass}" th:text="${row.statusLabel}">Chờ duyệt</span></td>
                        <td>
                            <div class="action-row">

                                <form method="post" th:if="${row.status.name() != 'APPROVED'}" th:action="@{/admin/team-management/update-status}">
                                    <input type="hidden" name="registrationId" th:value="${row.registrationId}">
                                    <input type="hidden" name="tournamentId" th:value="${selectedTournamentId}">
                                    <input type="hidden" name="status" th:value="${selectedStatus}">
                                    <input type="hidden" name="targetStatus" value="APPROVED">
                                    <button type="submit" class="btn-status btn-status--approve">Duyệt</button>
                                </form>
                                <form method="post" th:if="${row.status.name() != 'REJECTED'}" th:action="@{/admin/team-management/update-status}">
                                    <input type="hidden" name="registrationId" th:value="${row.registrationId}">
                                    <input type="hidden" name="tournamentId" th:value="${selectedTournamentId}">
                                    <input type="hidden" name="status" th:value="${selectedStatus}">
                                    <input type="hidden" name="targetStatus" value="REJECTED">
                                    <button type="submit" class="btn-status btn-status--reject">Hủy</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <footer th:replace="~{admin/fragments_admin/footer :: footer}"></footer>
    </main>
</div>
</body>
</html>

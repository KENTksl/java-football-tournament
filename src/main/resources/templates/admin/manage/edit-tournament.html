<div class="modal-content">
    <div class="modal-header">
        <h2 class="modal-title">Sửa giải đấu</h2>
        <button class="btn-close-box" onclick="closeEditModal()">x</button>
    </div>

    <form id="editTournamentForm" class="tournament-form">
        <input type="hidden" id="editTournamentId" name="id">
        <div class="form-group">
            <label for="editTournamentName">Tên giải đấu:</label>
            <input type="text" id="editTournamentName" name="name" required>
        </div>

        <div class="form-group">
            <label for="editOrganizer">Ban tổ chức:</label>
            <input type="text" id="editOrganizer" name="organizer" required>
        </div>

        <div class="form-group">
            <label for="editMode">Chế độ:</label>
            <input type="text" id="editMode" name="mode">
        </div>

        <div class="form-group">
            <label for="editTeams">Số đội:</label>
            <input type="text" id="editTeams" name="teams">
        </div>

        <div class="form-group">
            <label for="editDescription">Mô tả:</label>
            <textarea id="editDescription" name="description" rows="6"></textarea>
        </div>

        <div class="form-actions-center">
            <button type="submit" class="btn-save-figma">Cập nhật</button>
        </div>
    </form>
</div>
